<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 體感控制器</title>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; margin: 0; touch-action: manipulation; }
        .btn-box { display: flex; justify-content: space-around; margin-top: 50px; }
        .btn { width: 140px; height: 140px; font-size: 30px; border-radius: 20px; background: #444; color: white; border: none; font-weight: bold; }
        .btn:active { background: #007bff; }
        #sensor-btn { padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; width: 80%; margin-top: 20px; }
        #val { font-size: 60px; color: #00ff00; margin: 20px; }
    </style>
</head>
<body>
    <h2>AI 跨裝置控制端</h2>
    <button id="sensor-btn" onclick="start()">啟動體感感測</button>
    <div id="val">0</div>
    <div class="btn-box">
        <button class="btn" id="L">左</button>
        <button class="btn" id="R">右</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { /* 貼上與 index.html 相同的鑰匙 */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tiltRef = ref(db, 'car/tilt');

        // 按鈕控制
        const send = (v) => set(tiltRef, v);
        document.getElementById('L').onpointerdown = () => send(-30);
        document.getElementById('L').onpointerup = () => send(0);
        document.getElementById('R').onpointerdown = () => send(30);
        document.getElementById('R').onpointerup = () => send(0);

        // 體感控制
        window.start = () => {
            document.getElementById('sensor-btn').style.display = 'none';
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') init(); });
            } else { init(); }
        };

        function init() {
            window.addEventListener('deviceorientation', (e) => {
                let tilt = Math.round(e.gamma);
                document.getElementById('val').innerText = tilt;
                send(tilt);
            });
        }
    </script>
</body>
</html>
